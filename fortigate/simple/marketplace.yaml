# Title shown in Application Information tab.
title: FortiGate Next-Generation Firewall (NGFW)
# Sub Title shown in Application Information tab.
description: This is a ORM Stack which deploys one FortiGate NGFW instance
schemaVersion: 1.1.0
version: "20190304"

# URL of Logo Icon used on Application Information tab. Logo must be 130x130 pixels.
# (Optional)
logoUrl: "https://cloudmarketplace.oracle.com/marketplace/content?contentId=61333089"

# Used in Application Information tab to Hyperlink Title and Logo to the Marketplace 
# Listing.
# Also used to link to Listing Usage section for "View Instructions".
# (Optional) If it is missing, Application Information uses the 
# "marketplace-listing-id" tag for the same purpose.
source:
  type: marketplace
  reference: 56967152

locale: "en"
variableGroups:
  - title: "Hidden Variable Group"    
    visible: false
    variables:
#"variables used internally - not exposed to end user"    
      - tenancy_ocid 
      - region 
      - mp_listing_id
      - mp_listing_resource_id
      - mp_listing_resource_version   
      - availability_domain_number          
      - mp_subscription_enabled      
      - network_strategy_enum
      - subnet_type_enum
      - nsg_config_enum
      - custom_image_id
      - vm_license_key

  - title: "Compute Configuration"
    variables:
      - compute_compartment_ocid
      - vm_display_name
      - hostname_label      
      - vm_compute_shape
      - vm_flex_shape_ocpus      
      - availability_domain_name
      - ssh_public_key
      - vm_block_volume_size      

  - title: "Virtual Cloud Network"
    variables:
      - network_compartment_ocid
      - network_strategy
      - network_configuration_strategy      
      - vcn_id 
      - vcn_display_name       
      - vcn_dns_label
      - vcn_cidr_block              

  - title: "Management Subnet"
    visible: #($network_strategy  == ""Use Existing VCN and Subnet"") OR (network_configuration_strategy ==  "Customize Network Configuration")
      or:
        - eq:         
          - network_strategy 
          - "Use Existing VCN and Subnet"    
        - eq:
          - network_configuration_strategy
          - "Customize Network Configuration"
    variables:
      - mgmt_subnet_type
      - mgmt_subnet_id 
      - mgmt_subnet_display_name       
      - mgmt_subnet_cidr_block      
      - mgmt_subnet_dns_label
      - mgmt_nsg_configuration_strategy

  - title: "Management Network Security Group"
    visible: #($mgmt_nsg_configuration_strategy  ==  "Customize Network Security Group")
      eq:
        - mgmt_nsg_configuration_strategy 
        - "Customize Network Security Group"
    variables:
      - mgmt_nsg_display_name
      - mgmt_nsg_source_cidr
      - mgmt_nsg_ssh_port
      - mgmt_nsg_https_port

      
  - title: "WAN Subnet"
    visible: #($network_strategy  == ""Use Existing VCN and Subnet"") OR (network_configuration_strategy ==  "Customize Network Configuration")
      or:
        - eq:         
          - network_strategy 
          - "Use Existing VCN and Subnet"    
        - eq:
          - network_configuration_strategy
          - "Customize Network Configuration"
    variables:
      - wan_subnet_type    
      - wan_subnet_id 
      - wan_subnet_display_name       
      - wan_subnet_cidr_block      
      - wan_subnet_dns_label
      - wan_nsg_configuration_strategy

  - title: "WAN Network Security Group"
    visible: #($wan_nsg_configuration_strategy  ==  "Customize Network Security Group")
      eq:
        - wan_nsg_configuration_strategy 
        - "Customize Network Security Group"
    variables:
      - wan_nsg_display_name      
      - wan_nsg_source_cidr
      - wan_nsg_strategy_ingress
      - wan_nsg_customized_ports_ingress
      - wan_nsg_strategy_egress
      - wan_nsg_customized_ports_egress

  - title: "LAN Subnet"
    visible: #($network_strategy  == ""Use Existing VCN and Subnet"") OR (network_configuration_strategy ==  "Customize Network Configuration")
      or:
        - eq:         
          - network_strategy 
          - "Use Existing VCN and Subnet"    
        - eq:
          - network_configuration_strategy
          - "Customize Network Configuration"
    variables:
      - lan_subnet_type
      - lan_subnet_id 
      - lan_subnet_display_name       
      - lan_subnet_cidr_block      
      - lan_subnet_dns_label
      - lan_nsg_configuration_strategy

  - title: "LAN Network Security Group"
    visible: #($lan_nsg_configuration_strategy  ==  "Customize Network Security Group")
      eq:
        - lan_nsg_configuration_strategy 
        - "Customize Network Security Group"
    variables:
      - lan_nsg_display_name
      - lan_nsg_source_cidr
      - lan_nsg_strategy_ingress
      - lan_nsg_customized_ports_ingress
      - lan_nsg_strategy_egress
      - lan_nsg_customized_ports_egress
      

  - title: "Additional Configuration Options"
    variables:
      - tag_key_name
      - tag_value


######################################################
##############          VARIABLES        #############
######################################################

variables:
  # Hidden variables

######################################################
##############    HIDDEN VARIABLES       #############
######################################################


  tenancy_ocid:
    type: string
    title: Tenancy ID
    description: The Oracle Cloud Identifier (OCID) for your tenancy
    required: true

  region:
    type: oci:identity:region:name
    title: Region
    description: The region in which to create all resources
    required: true

  availability_domain_number:
    type: string    
    required: false    
    description: Availability Domain Number (Not used)

######################################################
##############   MARKETPLACE VARIABLES   #############
######################################################

  mp_listing_id:
    type: string    
    required: true    
    description: Marketplace Listing ID

  mp_listing_resource_id:
    type: oci:core:image:id
    required: true
    description: Marketplace Image OCID
    dependsOn:
      compartmentId: compute_compartment_ocid

  mp_listing_resource_version:
    type: string
    required: true
    description: Marketplace Listing package version


  mp_subscription_enabled:
    type: boolean
    title: Use Marketplace Image?
    default: false

  custom_image_id:
    type: string
    required: true
    title: Custom Image OCID
    # visible:
    #   eq:
    #     - mp_subscription_enabled
    #     - false


  tag_key_name:
    type: string
    required: true
    title: Tag key name

  tag_value:
    type: string
    required: true
    title: Tag value


######################################################
##############    COMPUTE VARIABLES      #############
######################################################

  compute_compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    title: Compute Compartment
    description: The compartment in which to create all Compute resources
    default: compartment_ocid

  availability_domain_name:
    type: oci:identity:availabilitydomain:name
    dependsOn:
      compartmentId: compute_compartment_ocid
    required: true
    default: 1
    title: Availability Domain
    description: Availability Domain

  ssh_public_key:
    type: string
    required: true
    title: Public SSH Key string
    description: Public SSH Key to access VM via SSH

  vm_display_name:
    type: string
    required: true
    title: Instance Name
    description: The name of the Instance

  vm_license_key:
    type: string
    required: false
    title: FortiGate License Key
    description: The license key for FortiGate

  vm_compute_shape:
    type: oci:core:instanceshape:name
    default: VM.Standard2.4
    title: Compute Shape
    required: true
    dependsOn:
      compartmentId: compute_compartment_ocid
      imageId: mp_listing_resource_id

  vm_flex_shape_ocpus:
    visible: #($vm_compute_shape  == ""VM.Standard.E3.Flex"")
      eq:
        - vm_compute_shape 
        - "VM.Standard.E3.Flex"
    type: integer
    #default: 2
    title: Flex Shape OCPUs
    minimum: 1
    maximum: 64
    required: false

  vm_block_volume_size:
    type: integer
    default: 50
    required: true
    minimum: 50
    title: Block Volume Size
    description: The block volume size attached to FortiGate instance
        

  hostname_label:
    type: string
    required: false
    title: DNS Hostname Label
      

######################################################
##############     NETWORK VARIABLES     #############
######################################################

  network_compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    title: Network Compartment
    description: The compartment in which to create all Network resources
    default: compartment_ocid    


  # Network Type Options
  network_strategy:
    type: enum
    title: Network Strategy
    description: Create or use existing Network Stack (VCN and Subnet)
    enum:
      - "Create New VCN and Subnet"
      - "Use Existing VCN and Subnet"
    required: true
    default: "Create New VCN and Subnet"


  # Network Configuration
  network_configuration_strategy:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: enum
    title: Configuration Strategy
    description: Use recommended configuration or customize it
    enum:
      - "Use Recommended Configuration"
      - "Customize Network Configuration"
    required: true
    default: "Use Recommended Configuration"



######## VCN ########    

  vcn_display_name:
    visible: #($network_strategy  == ""Create New VCN and Subnet"") AND (network_configuration_strategy ==  "Customize Network Configuration")
      and:
        - eq: 
          - network_strategy 
          - "Create New VCN and Subnet"
        - eq:
          - network_configuration_strategy
          - "Customize Network Configuration"
    type: string
    required: true
    title: Name
    description: The name of the new Virtual Cloud Network (VCN)

  vcn_id:
    visible: #($network_strategy  == "Use Existing VCN and Subnet")
      eq:
        - network_strategy 
        - "Use Existing VCN and Subnet"
    type: oci:core:vcn:id
    dependsOn:
      compartmentId: network_compartment_ocid 
    required: true
    title: Existing VCN
    description: An existing Virtual Cloud Network (VCN) in which to create the compute instances, network resources, and load balancers. If not specified, a new VCN is created.

  vcn_cidr_block:
    visible: #($network_strategy  == ""Create New VCN and Subnet"") AND (network_configuration_strategy ==  "Customize Network Configuration")
      and:
        - eq: 
          - network_strategy 
          - "Create New VCN and Subnet"
        - eq:
          - network_configuration_strategy
          - "Customize Network Configuration"
    type: string
    required: true
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    title: CIDR Block
    description: The CIDR of the new Virtual Cloud Network (VCN). If you plan to peer this VCN with another VCN, the VCNs must not have overlapping CIDRs.

  vcn_dns_label:
    visible: #($network_strategy  == ""Create New VCN and Subnet"") AND (network_configuration_strategy ==  "Customize Network Configuration")
      and:
        - eq: 
          - network_strategy 
          - "Create New VCN and Subnet"
        - eq:
          - network_configuration_strategy
          - "Customize Network Configuration"
    type: string
    required: true
    title: DNS Label
    maxLenght: 15
    description: VCN DNS Label. Only letters and numbers, starting with a letter. 15 characters max.    

######## MANAGEMENT SUBNET ########
  mgmt_subnet_type:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: enum
    title: Subnet Type
    description: Choose between private and public subnets
    enum:
      - "Private Subnet"
      - "Public Subnet"
    required: true
    default: "Public Subnet"
    
  mgmt_subnet_display_name:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    required: true
    title: Name
    description: The name of the new Management Subnet

  mgmt_subnet_cidr_block:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    required: true
    title: CIDR Block
    description: The CIDR of the new Subnet. The new subnet's CIDR should not overlap with any other subnet CIDRs.

  mgmt_subnet_id:
    visible: #($network_strategy  == "Use Existing VCN and Subnet")
      eq:
        - network_strategy 
        - "Use Existing VCN and Subnet"    
    type: oci:core:subnet:id
    dependsOn:
      vcnId: vcn_id 
      compartmentId: network_compartment_ocid 
    default: ''
    required: true
    title: Existing Subnet
    description: An existing Management subnet. This subnet must already be present in the chosen VCN.

  mgmt_subnet_dns_label:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    required: true
    title: DNS Label
    maxLenght: 15
    description: Subnet DNS Label. Only letters and numbers, starting with a letter. 15 characters max.    

######## WAN SUBNET ########

  wan_subnet_type:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: enum
    title: Subnet Type
    description: Choose between private and public subnets
    enum:
      - "Private Subnet"
      - "Public Subnet"
    required: true
    default: "Public Subnet"


  wan_subnet_display_name:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    required: true
    title: Name
    description: The name of the new WAN Subnet

  wan_subnet_cidr_block:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    required: true
    title: CIDR Block
    description: The CIDR of the new WAN Subnet. The new subnet's CIDR should not overlap with any other subnet CIDRs.

  wan_subnet_id:
    visible: #($network_strategy  == "Use Existing VCN and Subnet")
      eq:
        - network_strategy 
        - "Use Existing VCN and Subnet"    
    type: oci:core:subnet:id
    dependsOn:
      vcnId: vcn_id 
      compartmentId: network_compartment_ocid 
    default: ''
    required: true
    title: Existing WAN Subnet
    description: An existing WAN subnet. This subnet must already be present in the chosen VCN.

  wan_subnet_dns_label:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    required: true
    title: DNS Label
    maxLenght: 15
    description: WAN Subnet DNS Label. Only letters and numbers, starting with a letter. 15 characters max.    


######## LAN SUBNET ########

  lan_subnet_type:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: enum
    title: Subnet Type
    description: Choose between private and public subnets
    enum:
      - "Private Subnet"
      - "Public Subnet"
    required: true
    default: "Private Subnet"


  lan_subnet_display_name:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    required: true
    title: Name
    description: The name of the new LAN Subnet

  lan_subnet_cidr_block:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    pattern: "^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9]).(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9]?[0-9])\\/(3[0-2]|[1-2]?[0-9])$"
    required: true
    title: CIDR Block
    description: The CIDR of the new LAN Subnet. The new subnet's CIDR should not overlap with any other subnet CIDRs.

  lan_subnet_id:
    visible: #($network_strategy  == "Use Existing VCN and Subnet")
      eq:
        - network_strategy 
        - "Use Existing VCN and Subnet"    
    type: oci:core:subnet:id
    dependsOn:
      vcnId: vcn_id 
      compartmentId: network_compartment_ocid 
    default: ''
    required: true
    title: Existing LAN Subnet
    description: An existing LAN subnet. This subnet must already be present in the chosen VCN.

  lan_subnet_dns_label:
    visible: #($network_strategy  == ""Create New VCN and Subnet"")
      eq:
        - network_strategy 
        - "Create New VCN and Subnet"
    type: string
    required: true
    title: DNS Label
    maxLenght: 15
    description: LAN Subnet DNS Label. Only letters and numbers, starting with a letter. 15 characters max.    


######################################################
##############    SECURITY VARIABLES     #############
######################################################


  mgmt_nsg_configuration_strategy:
    visible: true
    type: enum
    title: Network Security Group Configuration
    description: Choose Network Security Rules Strategy
    enum:
      - "Use Recommended Configuration"
      - "Customize Network Security Group"
    required: true
    default: "Use Recommended Configuration"


  mgmt_nsg_display_name:
    type: string
    required: false
    title: Name
    
  mgmt_nsg_ssh_port:
    type: number
    required: false
    default: 22
    title: SSH Port Number

  mgmt_nsg_https_port:
    type: number
    required: false
    default: 443
    title: HTTPS Port Number

  mgmt_nsg_source_cidr:
    type: string
    required: false
    default: "0.0.0.0/0"
    title: Allowed Ingress Traffic (CIDR Block)



  wan_nsg_configuration_strategy:
    visible: true
    type: enum
    title: Network Security Group Configuration
    description: Choose Network Security Rules Strategy
    enum:
      - "Use Recommended Configuration"
      - "Customize Network Security Group"
    required: true
    default: "Use Recommended Configuration"

  wan_nsg_display_name:
    type: string
    required: false
    title: Name

  wan_nsg_strategy_ingress:
    visible: true
    type: enum
    title: WAN Ingress Traffic
    description: Choose Network Security Rules Strategy for Ingress traffic
    enum:
      - "Block all ports"
      - "Open all ports"
      - "Customize ports - Post deployment"
    required: true
    default: "Block all ports"

  wan_nsg_strategy_egress:
    visible: true
    type: enum
    title: WAN Egress Traffic
    description: Choose Network Security Rules Strategy for Egress traffic
    enum:
      - "Block all ports"
      - "Open all ports"
      - "Customize ports - Post deployment"
    required: true
    default: "Open all ports"

  wan_nsg_source_cidr:
    type: string
    required: false
    default: "0.0.0.0/0"
    title: Allowed Ingress Traffic (CIDR Block)


  lan_nsg_configuration_strategy:
    visible: true
    type: enum
    title: Network Security Group Configuration
    description: Choose Network Security Rules Strategy
    enum:
      - "Use Recommended Configuration"
      - "Customize Network Security Group"
    required: true
    default: "Use Recommended Configuration"



  lan_nsg_display_name:
    type: string
    required: false
    title: Name

  lan_nsg_strategy_ingress:
    visible: true
    type: enum
    title: LAN Ingress Traffic
    description: Choose Network Security Rules Strategy for Ingress traffic
    enum:
      - "Block all ports"
      - "Open all ports"
      - "Customize ports - Post deployment"
    required: true
    default: "Block all ports"

  lan_nsg_strategy_egress:
    visible: true
    type: enum
    title: LAN Egress Traffic
    description: Choose Network Security Rules Strategy for Egress traffic
    enum:
      - "Block all ports"
      - "Open all ports"
      - "Customize ports - Post deployment"
    required: true
    default: "Open all ports"

  lan_nsg_source_cidr:
    type: string
    required: false
    default: "0.0.0.0/0"
    title: Allowed Ingress Traffic (CIDR Block)


#############################################
###########    OUTPUT GROUPS     ############
#############################################

outputGroups:
  - title: "Management"
    outputs:
      - simple_instance_ocid
      - instance_mgmt_public_ip
      - instance_mgmt_private_ip


#############################################
##############     OUTPUTS     ##############
#############################################

outputs:
  simple_instance_ocid:
    type: string
    title: FortiGate Instance OCID
    visible: true

  instance_mgmt_https_url:
    type: link
    title: Open Management URL
    visible: false

  instance_mgmt_public_ip:
    type: link
    title: Management Public IP
    visible: #($mgmt_subnet_type == "Public Subnet")
      eq:
      - mgmt_subnet_type
      - "Public Subnet"
  
  instance_mgmt_private_ip:
    type: link
    title: Management Private IP
    visible: true
  
primaryOutputButton: instance_mgmt_https_url
